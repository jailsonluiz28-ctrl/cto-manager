<!DOCTYPE html>
<html>
<head>

    <title>Editar Usuário</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>✏️ Editar Usuário</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Usuário
                    </label>

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        value="{{ usuario_obj.username }}"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        E-mail
                    </label>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        value="{{ usuario_obj.email }}"
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Grupo
                    </label>

                    <select
                        name="grupo"
                        class="form-select"
                    >

                        {% for grupo in grupos %}

                            <option
                                value="{{ grupo.name }}"
                                {% if grupo in usuario_obj.groups.all %}
                                selected
                                {% endif %}
                            >

                                {{ grupo.name }}

                            </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Nova Senha
                    </label>

                    <input
                        type="password"
                        name="senha"
                        class="form-control"
                    >

                    <small class="text-muted">

                        Deixe em branco para manter a senha atual.

                    </small>

                </div>

                <button
                    type="submit"
                    class="btn btn-success">

                    💾 Salvar

                </button>

                <a href="/sistema/usuarios/"
                   class="btn btn-secondary">

                    Cancelar

                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
