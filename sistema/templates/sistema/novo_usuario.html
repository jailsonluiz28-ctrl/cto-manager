<!DOCTYPE html>
<html>
<head>

    <title>Novo Usuário</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <h2>➕ Novo Usuário</h2>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label>
                Usuário
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                required
            >

        </div>

        <div class="mb-3">

            <label>
                Email
            </label>

            <input
                type="email"
                name="email"
                class="form-control"
            >

        </div>

        <div class="mb-3">

            <label>
                Senha
            </label>

            <input
                type="password"
                name="senha"
                class="form-control"
                required
            >

        </div>

        <div class="mb-3">

            <label>
                Grupo
            </label>

            <select
                name="grupo"
                class="form-control"
                required
            >

                <option value="">
                    Selecione
                </option>

                <option value="Administrador">
                    Administrador
                </option>

                <option value="Operador">
                    Operador
                </option>

                <option value="Consulta do Técnico">
                    Consulta do Técnico
                </option>

            </select>

        </div>

        <button
            type="submit"
            class="btn btn-success"
        >

            Salvar Usuário

        </button>

    </form>

</div>

</body>
</html>
