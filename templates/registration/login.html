<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Login - CTO Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-header text-center bg-primary text-white">

                    <h3>🔐 CTO Manager</h3>

                </div>

                <div class="card-body">

                    <form method="post">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Usuário
                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Senha
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                required
                            >

                        </div>

                        {% if form.errors %}

                        <div class="alert alert-danger">

                            Usuário ou senha inválidos.

                        </div>

                        {% endif %}

                        <button
                            type="submit"
                            class="btn btn-primary w-100"
                        >
                            Entrar
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
