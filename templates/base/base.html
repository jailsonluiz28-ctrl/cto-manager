{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>
        {% block title %}
            CTO Manager
        {% endblock %}
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

    *{
        font-family:'Poppins',sans-serif;
    }

    body{
        background:#f4f6f9;
        margin:0;
        padding:0;
    }

    .sidebar{
        position:fixed;
        top:0;
        left:0;
        width:260px;
        height:100vh;
        background:#0d6efd;
        color:white;
        overflow-y:auto;
        z-index:1000;
    }

    .sidebar .logo{
        padding:25px;
        text-align:center;
        font-size:24px;
        font-weight:bold;
        background:#0953c5;
    }

    .sidebar a{
        color:white;
        text-decoration:none;
        display:block;
        padding:14px 25px;
        transition:.2s;
    }

    .sidebar a:hover{
        background:rgba(255,255,255,.10);
        padding-left:35px;
    }

    .content{
        margin-left:260px;
        min-height:100vh;
    }

    .topbar{
        background:white;
        height:70px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:0 30px;
        box-shadow:0 2px 10px rgba(0,0,0,.08);
    }

    .page{
        padding:30px;
    }

    .card{
        border:none;
        border-radius:15px;
        box-shadow:0 3px 12px rgba(0,0,0,.08);
    }

    .btn{
        border-radius:10px;
    }

    </style>

    {% block css %}{% endblock %}

</head>

<body>

{% include 'base/menu_lateral.html' %}

{% include 'base/navbar.html' %}

{% block content %}
{% endblock %}

{% include 'base/footer.html' %}

{% include 'base/scripts.html' %}

{% block js %}
{% endblock %}

</body>

</html>
