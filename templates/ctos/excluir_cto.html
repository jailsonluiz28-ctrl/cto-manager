{% extends 'base/base.html' %}

{% block title %}
Excluir CTO
{% endblock %}

{% block content %}

<div class="container-fluid">

<div class="card border-danger">

<div class="card-header bg-danger text-white">

<h3>

🗑 Excluir CTO

</h3>

</div>

<div class="card-body">

<h4>

Deseja realmente excluir esta CTO?

</h4>

<hr>

<p>

<strong>Nome:</strong>

{{ cto.nome }}

</p>

<p>

<strong>Rua:</strong>

{{ cto.rua }}

</p>

<p>

<strong>Tipo:</strong>

{{ cto.tipo }}

</p>

<hr>

<form method="POST">

{% csrf_token %}

<button
class="btn btn-danger">

🗑 Confirmar Exclusão

</button>

<a
href="/ctos/"
class="btn btn-secondary">

Cancelar

</a>

</form>

</div>

</div>

</div>

{% endblock %}
