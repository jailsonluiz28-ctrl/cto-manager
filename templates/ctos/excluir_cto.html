<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">

    <title>Excluir CTO</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card border-danger shadow">

        <div class="card-header bg-danger text-white">

            <h3>🗑 Excluir CTO</h3>

        </div>

        <div class="card-body">

            <p>Deseja realmente excluir a CTO?</p>

            <h4>{{ cto.nome }}</h4>

            <hr>

            <form method="POST">

                {% csrf_token %}

                <button
                    type="submit"
                    class="btn btn-danger">

                    Sim, Excluir

                </button>

                <a href="/ctos/"
                   class="btn btn-secondary">

                    Cancelar

                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
