{% extends 'base/base.html' %}

{% block title %}
Novo Plano
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="card">

        <div class="card-header bg-success text-white">

            <h3>

                🌐 Novo Plano

            </h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <hr>

                <button class="btn btn-success">

                    💾 Salvar Plano

                </button>

                <a href="/planos/" class="btn btn-secondary">

                    Cancelar

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
