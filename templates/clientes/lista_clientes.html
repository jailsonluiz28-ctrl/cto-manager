<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color:#f5f6fa;">

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>👥 Clientes</h2>

        <div>

            <a href="/clientes/novo/" class="btn btn-success">
                ➕ Novo Cliente
            </a>

            <a href="/clientes/exportar/pdf/" class="btn btn-danger">
                📄 PDF
            </a>

            <a href="/" class="btn btn-primary">
                🏠 Dashboard
            </a>

        </div>

    </div>

    <div class="card shadow p-4 mb-4">

        <form method="GET">

            <div class="row">

                <div class="col-md-10">

                    <input
                        type="text"
                        name="busca"
                        class="form-control"
                        placeholder="Pesquisar cliente, CTO ou rua..."
                        value="{{ busca }}"
                    >

                </div>

                <div class="col-md-2">

                    <button class="btn btn-primary w-100">
                        🔎 Buscar
                    </button>

                </div>

            </div>

        </form>

    </div>

    <div class="card shadow">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-striped table-hover">

                    <thead class="table-dark">

                        <tr>
                            <th>Cliente</th>
                            <th>CTO</th>
                            <th>Porta</th>
                            <th>Rua</th>
                        </tr>

                    </thead>

                    <tbody>

                        {% for cliente in clientes %}

                        <tr>

                            <td>
                                <a href="/clientes/{{ cliente.id }}/">
                                    {{ cliente.nome }}
                                </a>
                            </td>

                            <td>{{ cliente.cto.nome }}</td>

                            <td>{{ cliente.porta }}</td>

                            <td>{{ cliente.cto.rua }}</td>

                        </tr>

                        {% empty %}

                        <tr>

                            <td colspan="4" class="text-center">

                                Nenhum cliente encontrado.

                            </td>

                        </tr>

                        {% endfor %}

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <div class="mt-3">

        <a href="/" class="btn btn-secondary">
            ← Voltar ao Dashboard
        </a>

    </div>

</div>

</body>
</html>
