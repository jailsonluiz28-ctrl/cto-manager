<!DOCTYPE html>
<html>
<head>

    <title>CTOs Lotadas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center">

        <h2>🚨 CTOs Lotadas</h2>

        <a href="/"
           class="btn btn-primary">

            Dashboard

        </a>

    </div>

    <hr>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-striped">

                <thead class="table-danger">

                    <tr>

                        <th>CTO</th>
                        <th>Rua</th>
                        <th>Portas</th>

                    </tr>

                </thead>

                <tbody>

                {% for cto in ctos_lotadas %}

                    <tr>

                        <td>{{ cto.nome }}</td>

                        <td>{{ cto.rua }}</td>

                        <td>

                            {{ cto.portas_ocupadas }}/{{ cto.portas_total }}

                        </td>

                    </tr>

                {% empty %}

                    <tr>

                        <td colspan="3"
                            class="text-center">

                            Nenhuma CTO lotada.

                        </td>

                    </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
