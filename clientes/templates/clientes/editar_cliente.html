<!DOCTYPE html>
<html>
<head>
    <title>Editar Cliente</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-warning">
            <h3>✏️ Editar Cliente</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">
                        Nome do Cliente
                    </label>

                    {{ form.nome }}
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        CTO
                    </label>

                    {{ form.cto }}
                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Porta
                    </label>

                    <select
                        name="porta"
                        class="form-select"
                        required
                    >

                        {% for valor,texto in form.porta.field.choices %}

                            <option
                                value="{{ valor }}"

                                {% if valor == cliente.porta %}
                                    selected
                                {% endif %}
                            >

                                {{ texto }}

                            </option>

                        {% endfor %}

                    </select>

                </div>

                <button
                    type="submit"
                    class="btn btn-success"
                >
                    💾 Salvar Alterações
                </button>

                <a
                    href="/clientes/"
                    class="btn btn-secondary"
                >
                    Cancelar
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
