<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Cliente</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3>Novo Cliente</h3>
        </div>

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Nome do Cliente</label>
                    {{ form.nome }}
                </div>

                <div class="mb-3">
                    <label class="form-label">CTO</label>
                    {{ form.cto }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Porta</label>
                    {{ form.porta }}
                </div>

                <button type="submit" class="btn btn-success">
                    Salvar Cliente
                </button>

                <a href="/clientes/" class="btn btn-secondary">
                    Cancelar
                </a>

                <a href="/"
                   class="btn btn-primary">
                    🏠 Dashboard
                </a>

            </form>

        </div>

    </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    const ctoSelect = document.getElementById('id_cto');
    const portaSelect = document.getElementById('id_porta');

    ctoSelect.addEventListener('change', function () {

        const ctoId = this.value;

        portaSelect.innerHTML =
            '<option>Carregando...</option>';

        if (!ctoId) {

            portaSelect.innerHTML =
                '<option>Selecione uma CTO</option>';

            return;
        }

        fetch(`/clientes/portas/${ctoId}/`)
            .then(response => response.json())
            .then(data => {

                portaSelect.innerHTML = '';

                data.portas.forEach(function(porta) {

                    const option =
                        document.createElement('option');

                    option.value = porta.numero;

                    option.textContent = porta.texto;

                    portaSelect.appendChild(option);
                });

            });
    });

});
</script>

</body>
</html>
